name: Root CI & Deploy

# The ONLY supported path to production for the marketing root (palonexus.ai). This
# workflow runs ONLY on a push to main (i.e. a merged, reviewed PR): it re-runs the
# validate gate (root-ci.yml, the same workflow PRs run) and then deploys to Cloudflare
# Workers. Pull requests are validated by root-ci.yml on its own — this workflow never
# runs for PRs, so PR checks never show a skipped deploy job. There is no manual/laptop
# deploy path — see scripts/no-manual-deploy.mjs. Fully independent of
# docs-ci-deploy.yml so a root content change can never block or destabilize a docs
# deploy, or vice versa.
on:
  push:
    branches: [main]

# Least privilege: the workflow only needs to read the repo. Deployment authenticates to
# Cloudflare with a scoped API token from secrets, never the GITHUB_TOKEN.
permissions:
  contents: read

# Serialize deploys per ref; never cancel an in-flight deploy.
concurrency:
  group: root-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'

jobs:
  validate:
    name: Validate
    # Reuse the exact validate gate PRs run — the deploy can never bypass it.
    uses: ./.github/workflows/root-ci.yml
    permissions:
      contents: read

  deploy:
    name: Deploy to Cloudflare Workers
    needs: validate
    # SAFEGUARDS — deployment is gated on ALL of:
    #   * the canonical repository (forks have a different owner/name → never deploy),
    #   * a push event to the main branch ref (defense in depth on top of the trigger —
    #     pull_request never deploys, even from a branch in this repo).
    # Fork PRs additionally cannot read the secrets below, so they cannot publish.
    if: ${{ github.repository == 'rogerchucker/palonexus-web' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    # The "production" GitHub Environment holds the Cloudflare secrets and can require a
    # human reviewer / restrict to main before any deploy runs.
    environment:
      name: production
      url: https://palonexus.ai/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build root assets
        run: npm run build:root

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy -c wrangler.jsonc

      - name: Verify deployment (post-deploy smoke test)
        run: |
          set -euo pipefail
          fail=0
          root=$(curl -fsS -o /dev/null -w '%{http_code}' --retry 5 --retry-delay 6 --retry-all-errors "https://palonexus.ai/" || echo 000)
          echo "$root  https://palonexus.ai/"
          [ "$root" = "200" ] || { echo "::error::Marketing root failed post-deploy check (HTTP $root)"; fail=1; }
          # /docs is a separate worker route — must remain reachable after a root deploy.
          docs=$(curl -fsS -o /dev/null -w '%{http_code}' "https://palonexus.ai/docs/" || echo 000)
          echo "$docs  https://palonexus.ai/docs/ (docs site, must remain reachable)"
          [ "$docs" = "200" ] || { echo "::error::Docs site no longer 200 (HTTP $docs)"; fail=1; }
          exit $fail
