name: Root CI

# Validate gate for the marketing root (palonexus.ai): Prettier, build, Playwright E2E.
# Runs standalone on pull requests, and is reused (workflow_call) by root-ci-deploy.yml
# as the gate before any push-to-main deploy. One definition, two entry points — so PR
# runs never show a skipped deploy job, and the deploy can never bypass validation.
on:
  pull_request:
    branches: [main]
  workflow_call:

# Least privilege: validation only needs to read the repo.
permissions:
  contents: read

# Cancel superseded PR runs. Push-to-main invocations are serialized by the caller's
# concurrency group in root-ci-deploy.yml and are never cancelled.
concurrency:
  group: root-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '22'

jobs:
  validate:
    name: Validate (format · build · E2E)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Build root (also validates the landing content schema)
        run: npm run build:root

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end root site tests (Playwright)
        run: npm run test:e2e:root

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-root
          path: playwright-report/
          retention-days: 7
